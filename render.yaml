services:
  - type: web
    name: dnd-character-sheet
    env: node
    region: frankfurt   # más cercano a España
    plan: free

    # 1. Compila el frontend Vue, luego instala deps del backend
    # npm install en vez de npm ci: evita conflictos de binarios nativos
    # (package-lock.json generado en Windows tiene deps win32 que npm ci rechaza en Linux)
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install

    # 2. Arranca el servidor Express (sirve API + frontend compilado)
    startCommand: node backend/server.js

    # Variables de entorno — rellenar en el dashboard de Render
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000         # Render usa 10000 por defecto

      # ── Backend runtime ───────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: APP_URL
        sync: false          # URL final de Render, ej: https://rollbook.onrender.com
      - key: ALLOWED_ORIGIN
        sync: false          # misma URL que APP_URL

      # ── Stripe (opcional — si no se ponen, pagos desactivados) ────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_PRICE_ID_DM
        sync: false
      - key: STRIPE_PRICE_ID_SLOTS
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── Frontend build time (VITE_ vars se incrustan en el bundle) ─
      - key: VITE_SUPABASE_URL
        sync: false          # mismo valor que SUPABASE_URL
      - key: VITE_SUPABASE_ANON_KEY
        sync: false          # clave anon pública de Supabase
